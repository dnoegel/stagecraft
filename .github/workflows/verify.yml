name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax-check every source JS
        run: |
          set -e
          find src bin demo/slides scripts tests -name '*.js' -print0 \
            | xargs -0 -n1 node -c

      - name: AST roundtrip tests
        run: npm run verify

      - name: Build bundles
        run: npm run build

      - name: Assemble deploy directory
        run: node scripts/deploy-build.js
