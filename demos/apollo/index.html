<!doctype html>
<html lang="en" data-theme="phosphor">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Apollo 11 — One Small Step</title>
  <meta name="description" content="A Stagecraft keynote about Apollo 11, the mission that put humans on the Moon — July 1969.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Space Grotesk for display (spacey, geometric) · JetBrains Mono for body/mono (mission-control terminals) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Symbols — used sparingly in Pillars / Timeline -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">

  <!-- Base bundle (engine + helpers + components + phosphor theme). -->
  <link rel="stylesheet" href="../../dist/themes/phosphor.bundle.css">

  <!-- Apollo overrides — repaints phosphor in amber-on-black mission-control tones. -->
  <link rel="stylesheet" href="theme.css">
</head>
<body>

  <div class="welcome" id="welcome">
    <div class="key-prompt"><span class="accent">&#9679;</span>&nbsp;&nbsp;PRESS <span class="accent">&rarr;</span> OR <span class="accent">SPACE</span> TO BEGIN</div>
    <h1>Apollo 11</h1>
    <div class="by">ONE SMALL STEP &middot; JULY 1969</div>
  </div>

  <main id="stage"></main>

  <div class="ui">
    <div class="ui-brand"><span class="br-accent">APOLLO</span>&middot;11</div>
    <div class="ui-title" id="uiTitle"></div>
    <div class="ui-counter">
      <span id="curSec">00</span><span class="slash">/</span><span class="total">00</span>
    </div>
    <div class="ui-dots" id="uiDots"></div>
    <div class="ui-hint" id="uiHint">&rarr; next &middot; &larr; prev &middot; S storyboard &middot; F fullscreen &middot; R replay &middot; P presenter</div>
  </div>

  <!-- Single bundle: engine + helpers + transitions + all components + edit-mode. -->
  <script src="../../dist/stagecraft.bundle.js"></script>
  <!-- Deck manifest: order + transitions. -->
  <script src="stagecraft.config.js"></script>
</body>
</html>
