<!doctype html>
<html lang="en" data-theme="paper">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tokyo · April 2026</title>
  <meta name="description" content="A travel diary about seven days in Tokyo, April 2026. Built with Stagecraft.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Diary feel: Caveat handwritten · Cormorant Garamond serif display · Inter body -->
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap">
  <!-- Material Symbols (sparingly, in case any component needs them) -->
  <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">

  <!-- Paper bundle (engine + helpers + transitions + components + paper theme tokens). -->
  <link rel="stylesheet" href="../../dist/themes/paper.bundle.css">

  <!-- Travel diary overrides — applied on top of the paper theme. -->
  <link rel="stylesheet" href="theme.css">
</head>
<body>

  <div class="welcome" id="welcome">
    <div class="key-prompt"><span class="accent">&#9679;</span>&nbsp;&nbsp;Press <span class="accent">&rarr;</span> or <span class="accent">Space</span> to begin</div>
    <h1>Tokyo</h1>
    <div class="by">a travel diary &middot; april 2026</div>
  </div>

  <main id="stage"></main>

  <div class="ui">
    <div class="ui-brand"><span class="br-accent">TOKYO</span>&middot;DIARY</div>
    <div class="ui-title" id="uiTitle"></div>
    <div class="ui-counter">
      <span id="curSec">00</span><span class="slash">/</span><span class="total">00</span>
    </div>
    <div class="ui-dots" id="uiDots"></div>
    <div class="ui-hint" id="uiHint">&rarr; next &middot; &larr; prev &middot; S storyboard &middot; F fullscreen &middot; R replay &middot; P presenter</div>
  </div>

  <!-- Single bundle: engine + helpers + transitions + all components + edit-mode. -->
  <script src="../../dist/stagecraft.bundle.js"></script>
  <!-- Deck manifest: order + transitions. -->
  <script src="stagecraft.config.js"></script>
</body>
</html>
